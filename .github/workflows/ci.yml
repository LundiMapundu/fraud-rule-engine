name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ vars.CI_DB_NAME }}
          POSTGRES_USER: ${{ vars.CI_DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U $CI_DB_USER -d $CI_DB_NAME"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Unit tests
        run: uv run pytest tests/unit -v

      - name: Integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://${{ vars.CI_DB_USER }}:${{ secrets.CI_DB_PASSWORD }}@localhost:5432/${{ vars.CI_DB_NAME }}
          REDIS_URL: redis://localhost:6379/0
          API_KEY: ${{ secrets.CI_API_KEY }}
        run: uv run pytest tests/integration -v

      - name: Test coverage
        env:
          DATABASE_URL: postgresql+asyncpg://${{ vars.CI_DB_USER }}:${{ secrets.CI_DB_PASSWORD }}@localhost:5432/${{ vars.CI_DB_NAME }}
          REDIS_URL: redis://localhost:6379/0
          API_KEY: ${{ secrets.CI_API_KEY }}
        run: uv run pytest --cov=fraud_engine --cov-report=term-missing

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fraud-rule-engine .
